body{overflow:hidden}
.app{position:relative;min-height:100vh;overflow:hidden;background:
  radial-gradient(circle at 18% 16%, rgba(168,85,247,.14), transparent 38%),

.app::after{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 50% 48%, transparent 12%, rgba(0,0,0,.08) 58%, rgba(0,0,0,.24) 100%), linear-gradient(to bottom, rgba(0,0,0,.03), rgba(0,0,0,.12));transition:opacity .6s ease}
.app.login-mode{background:#040408}
.app.login-mode::before,.app.login-mode::after{opacity:.2}
#particleCanvas{position:absolute;inset:0;width:100%;height:100%;display:block;z-index:1}
#wingOverlay{position:absolute;inset:0;z-index:3;pointer-events:none}
#wingOverlay svg{position:absolute;left:0;top:0;overflow:visible}
#wingOverlay .login-lines{fill:none;stroke:rgba(236,167,255,.92);stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 6px rgba(214,120,255,.22));animation:wingHint 4.6s ease-in-out infinite}
#wingOverlay .login-lines.mi{stroke-width:2.2}
#wingOverlay .login-lines.in{stroke-width:3.1}
#wingOverlay .hit{fill:transparent;stroke:transparent;stroke-width:28;pointer-events:all;cursor:pointer}
@keyframes wingHint{0%,100%{opacity:.82;filter:drop-shadow(0 0 6px rgba(214,120,255,.20))}20%{opacity:.96}26%{opacity:1;filter:drop-shadow(0 0 14px rgba(255,140,255,.65))}36%{opacity:.86}72%{opacity:.84}78%{opacity:.97;filter:drop-shadow(0 0 10px rgba(200,130,255,.45))}}
.topbar{position:relative;z-index:5;width:min(1200px,calc(100vw - 24px));margin:12px auto 0;padding:10px 12px;border-radius:16px;border:1px solid rgba(255,255,255,.08);background:rgba(0,0,0,.18);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:space-between;gap:10px;transition:opacity .4s ease, transform .4s ease}
.brand{display:flex;align-items:center;gap:10px;min-width:0}.dot{width:30px;height:30px;border-radius:10px;background:linear-gradient(135deg,#f472b6,#8b5cf6)}

.loginScreen{position:absolute;inset:0;z-index:8;display:grid;place-items:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .45s ease}
.loginScreen.show{opacity:1;pointer-events:none}
.loginWrap{pointer-events:auto;width:min(460px,calc(100vw - 24px));display:flex;flex-direction:column;gap:10px;transform:translateY(14px) scale(.985);opacity:0;transition:transform .45s ease, opacity .45s ease}
.loginScreen.show .loginWrap{pointer-events:auto;transform:translateY(0) scale(1);opacity:1}
.panel{border:1px solid rgba(255,255,255,.10);background:rgba(6,6,10,.7);backdrop-filter:blur(16px);border-radius:18px;box-shadow:0 22px 60px rgba(0,0,0,.48);overflow:hidden}

function getViewBox(svgText){const m=svgText.match(/viewBox\s*=\s*"([\d.\-]+)\s+([\d.\-]+)\s+([\d.\-]+)\s+([\d.\-]+)"/i); return m?{w:+m[3],h:+m[4]}:{w:1400,h:1100};}

async function sampleLinePoints(svgText,maxPoints){
  const vb=getViewBox(svgText), SW=Math.round(vb.w), SH=Math.round(vb.h);
  const img=new Image(); const blob=new Blob([svgText],{type:'image/svg+xml;charset=utf-8'}); const url=URL.createObjectURL(blob);
  await new Promise((res,rej)=>{img.onload=res; img.onerror=rej; img.src=url;}).catch(()=>{});
  const c=document.createElement('canvas'); c.width=SW; c.height=SH; const x=c.getContext('2d',{willReadFrequently:true});
  if(!x) return {pts:[],SW,SH}; x.clearRect(0,0,SW,SH); x.drawImage(img,0,0,SW,SH); URL.revokeObjectURL(url);
  const d=x.getImageData(0,0,SW,SH).data; const candidates=[];
  for(let y=0;y<SH;y++){ for(let xx=0;xx<SW;xx++){ const i=(y*SW+xx)*4; const a=d[i+3]; if(a>8) candidates.push({x:xx,y,w:a}); }}
  if(!candidates.length) return {pts:[],SW,SH};
  let acc=0; const prefix=new Float64Array(candidates.length); for(let i=0;i<candidates.length;i++){acc+=candidates[i].w; prefix[i]=acc;}
  const pts=[]; for(let i=0;i<maxPoints;i++){ let r=Math.random()*acc,lo=0,hi=prefix.length-1; while(lo<hi){const mid=(lo+hi)>>1; if(prefix[mid]<r) lo=mid+1; else hi=mid;} const p=candidates[lo]; pts.push({x:p.x+(Math.random()-.5)*0.8,y:p.y+(Math.random()-.5)*0.8,w:p.w}); }
  return {pts,SW,SH};
}

    const left=center.x - (SW*scale)/2; const top=center.y - (SH*scale)/2;
    overlay.innerHTML = `\n      <svg viewBox="0 0 ${SW} ${SH}" width="${SW*scale}" height="${SH*scale}" style="left:${left}px;top:${top}px">\n        <g id="dragonflyHitLayer">\n          <!-- 전체 잠자리 클릭영역: 완전 투명 / 클릭만 동작 -->\n          <!-- 오른쪽 위날개 -->\n          <path class="hit" d="M 735 370\n            C 802 336, 885 312, 992 274\n            C 1086 240, 1180 195, 1266 164\n            C 1314 146, 1360 150, 1378 176\n            C 1392 197, 1387 223, 1360 244\n            C 1325 271, 1287 295, 1235 324\n            C 1170 361, 1103 388, 1023 412\n            C 930 440, 847 446, 777 440\n            C 753 438, 740 430, 732 416\n            C 724 402, 725 384, 735 370 Z"/>\n          <!-- 오른쪽 아래날개 -->\n          <path class="hit" d="M732 456 C796 468, 874 490, 972 528 C1068 565, 1162 601, 1248 633 C1312 657, 1365 685, 1389 710 C1407 729, 1407 751, 1387 767 C1361 787, 1311 787, 1252 772 C1186 755, 1118 741, 1034 735 C939 727, 854 724, 785 712 C753 706, 736 692, 729 670 C722 648, 722 618, 725 581 C728 533, 730 491, 732 456 Z"/>\n          <!-- 중앙 몸통(상단) -->\n          <path class="hit" d="M670 185 C712 170, 760 190, 782 230 C795 253, 792 290, 770 315 C788 338, 798 365, 798 392 C798 432, 778 466, 744 484 C722 495, 695 496, 673 487 C635 471, 612 436, 614 394 C615 364, 626 336, 645 314 C622 286, 620 248, 638 219 C648 203, 658 193, 670 185 Z"/>\n          <!-- 중앙 몸통(하단/배) + 클릭여유 -->\n          <path class="hit" d="M670 448 C690 440, 710 438, 730 442 C772 451, 796 487, 792 530 C787 591, 784 657, 784 742 C784 858, 780 962, 770 1048 C765 1083, 734 1100, 700 1100 C666 1100, 635 1083, 630 1048 C620 962, 616 858, 616 742 C616 657, 613 591, 608 530 C604 487, 628 451, 670 448 Z"/>\n          <!-- 좌우 대칭 왼쪽 날개 -->\n          <g transform="translate(1400,0) scale(-1,1)">\n            <path class="hit" d="M 735 370\n              C 802 336, 885 312, 992 274\n              C 1086 240, 1180 195, 1266 164\n              C 1314 146, 1360 150, 1378 176\n              C 1392 197, 1387 223, 1360 244\n              C 1325 271, 1287 295, 1235 324\n              C 1170 361, 1103 388, 1023 412\n              C 930 440, 847 446, 777 440\n              C 753 438, 740 430, 732 416\n              C 724 402, 725 384, 735 370 Z"/>\n            <path class="hit" d="M732 456 C796 468, 874 490, 972 528 C1068 565, 1162 601, 1248 633 C1312 657, 1365 685, 1389 710 C1407 729, 1407 751, 1387 767 C1361 787, 1311 787, 1252 772 C1186 755, 1118 741, 1034 735 C939 727, 854 724, 785 712 C753 706, 736 692, 729 670 C722 648, 722 618, 725 581 C728 533, 730 491, 732 456 Z"/>\n          </g>\n        </g>\n      </svg>`;
    overlaySvg = overlay.querySelector('svg');
    const hitTargets = overlay.querySelectorAll('.hit');
    hitTargets.forEach(el => {
      el.addEventListener('click', ()=>openLoginFor(ROUTES.club), {passive:true});
      el.addEventListener('pointermove', e => {
        const r = canvas.getBoundingClientRect();
        mouse.x = e.clientX - r.left;
        mouse.y = e.clientY - r.top;
        mouse.active = true;
      }, {passive:true});
      el.addEventListener('pointerenter', e => {
        const r = canvas.getBoundingClientRect();
        mouse.x = e.clientX - r.left;
        mouse.y = e.clientY - r.top;
        mouse.active = true;
      }, {passive:true});
      el.addEventListener('pointerleave', () => { mouse.active = false; }, {passive:true});
    });
  }

  function resize(){
    dpr=Math.min(window.devicePixelRatio||1,2); W=window.innerWidth; H=window.innerHeight;
    canvas.width=Math.floor(W*dpr); canvas.height=Math.floor(H*dpr); canvas.style.width=W+'px'; canvas.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0); center={x:W*0.5,y:H*0.5};
    const scaleW=(W*1.22)/SW, scaleH=(H*1.08)/SH; scale=Math.max(scaleW,scaleH);
    for(const p of particles){ p.tx=toScreenX(p.sx); p.ty=toScreenY(p.sy); }
    renderWingOverlay();
  }
  window.addEventListener('resize', resize);
  resize();

  canvas.addEventListener('pointermove', e=>{ const r=canvas.getBoundingClientRect(); mouse.x=e.clientX-r.left; mouse.y=e.clientY-r.top; mouse.active=true; });
  canvas.addEventListener('pointerleave', ()=>mouse.active=false);

  const pointCount = window.innerWidth < 768 ? 4200 : 9800;
  const sampled = await sampleLinePoints(whiteStrokeSvg(SVG_TEXT), pointCount);
  SW=sampled.SW; SH=sampled.SH; resize();

  particles = sampled.pts.map((pt,i)=>{
    const tx=toScreenX(pt.x), ty=toScreenY(pt.y);
    const a=Math.random()*Math.PI*2, r=Math.max(window.innerWidth,window.innerHeight)*(0.34 + Math.random()*0.42);
    return {
      x:center.x + Math.cos(a)*r + (Math.random()-.5)*80,
      y:center.y + Math.sin(a)*r + (Math.random()-.5)*80,
      tx,ty,sx:pt.x,sy:pt.y,vx:0,vy:0,
      isOuter:(pt.w||0)>165,
      size:(window.innerWidth<768?0.44:0.36)+Math.random()*(window.innerWidth<768?0.95:0.78)+((pt.w||0)>165?(window.innerWidth<768?0.45:0.38):0),
      alpha:0.24 + Math.random()*0.72 + ((pt.w||0)>165 ? 0.08 : 0),
      tw:Math.random()*Math.PI*2, sparkleSeed:Math.random()*Math.PI*2,
      pulse:0, pulseV:0, phase:i/sampled.pts.length, lag:Math.random()*0.1,
      explodeVX:0, explodeVY:0
    };
  });

  function drawBackgroundGlow(form){
    const g=ctx.createRadialGradient(center.x,center.y,20,center.x,center.y,Math.min(W,H)*0.48);
    g.addColorStop(0,`rgba(244,114,182,${0.055*form})`);
    g.addColorStop(.4,`rgba(168,85,247,${0.035*form})`);
    g.addColorStop(1,'rgba(0,0,0,0)'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  }


  function openLoginFor(dest){
    pendingLoginDestination = dest || ROUTES.vip;
    if(loginShown){
      loginScreen.classList.add('show');
      memberIdInput?.focus();
      return;
    }
    triggerLoginTransition();
    setTimeout(()=>memberIdInput?.focus(), 760);
  }

  navLinks.forEach(a=>{
    a.addEventListener('click', (e)=>{
      const type=a.dataset.nav;
      if(type==='vip'){
        e.preventDefault();
        const url = new URL(window.location.href);
        url.searchParams.delete('vip');
        window.history.replaceState({},'',url);
        openLoginFor(ROUTES.vip);
        return;
      }
      if(type==='club'){
        a.setAttribute('href', ROUTES.club);
        return;
      }
      if(type==='party'){
        a.setAttribute('href', ROUTES.party);
        return;
      }
    });
  });

  function triggerLoginTransition(){
    if(transitioning||loginShown) return;
    pendingLoginDestination = pendingLoginDestination || ROUTES.club;
    transitioning=true; transitionAt=performance.now(); app.classList.add('transitioning');
    hintText.style.opacity='0';
    const wingG = overlay.querySelector('#wingLoginVisible');
    if(wingG){ wingG.style.animation='none'; wingG.style.filter='drop-shadow(0 0 22px rgba(255,160,255,.95))'; wingG.style.opacity='1'; }
    for(const p of particles){
      const dx=p.x-mouse.x, dy=p.y-mouse.y; const d=Math.hypot(dx,dy)||1;
      const ang = Math.atan2(p.y-center.y,p.x-center.x) + (Math.random()-.5)*0.6;
      const burst = p.isOuter ? (1.4+Math.random()*2.1) : (0.9+Math.random()*1.4);
      p.explodeVX = Math.cos(ang)*burst + (dx/d)*0.6;
      p.explodeVY = Math.sin(ang)*burst + (dy/d)*0.6;
      p.pulseV += p.isOuter ? 0.8 : 0.45;
    }
    setTimeout(()=>{ overlay.style.opacity='0'; app.classList.add('login-mode'); }, 220);
    setTimeout(()=>{ loginScreen.classList.add('show'); loginShown=true; }, 700);
  }

  function frame(now){
    raf=requestAnimationFrame(frame); ctx.clearRect(0,0,W,H);
    const t=clamp((now-startedAt)/3000,0,1); const form=easeOutCubic(t);
    if(!transitioning && t>0.98) hintText.style.opacity='0.7';
    const transT = transitioning ? clamp((now-transitionAt)/520,0,1) : 0;
    const transEase = easeOutCubic(transT);

    for(const p of particles){
      if(!transitioning){
        const gate = clamp((form*1.28) - (p.phase*0.42 + p.lag), 0, 1);
        const dx=p.tx-p.x, dy=p.ty-p.y;
        p.vx += dx*(0.006 + gate*0.028); p.vy += dy*(0.006 + gate*0.028);
        p.vx += Math.cos(now*0.0024 + p.tw) * (1-gate) * 0.03; p.vy += Math.sin(now*0.0022 + p.tw) * (1-gate) * 0.03;
        if(mouse.active){
          const mx=p.x-mouse.x, my=p.y-mouse.y, d2=mx*mx+my*my, rad=120;
          if(d2<rad*rad && d2>0.001){ const d=Math.sqrt(d2), n=1-d2/(rad*rad), burst=n*n, f=.95*burst; p.vx+=(mx/d)*f; p.vy+=(my/d)*f; p.pulseV += 0.22*burst; }
        }
        p.vx += Math.cos(now*0.0018+p.tw)*0.0022*gate; p.vy += Math.sin(now*0.0015+p.tw)*0.0022*gate;
        p.vx*=0.90; p.vy*=0.90; p.x+=p.vx; p.y+=p.vy;
      }else{
        p.vx = (p.vx*0.88) + p.explodeVX*(0.14 + transEase*0.18);
        p.vy = (p.vy*0.88) + p.explodeVY*(0.14 + transEase*0.18);
        p.x += p.vx; p.y += p.vy;
        p.explodeVX *= 0.985; p.explodeVY *= 0.985;
      }

      const tw=(Math.sin(now*0.0042 + p.tw)+1)*0.5;
      const glint=(Math.sin(now*0.011 + p.sparkleSeed)+1)*0.5;
      p.pulseV += (-p.pulse)*0.06; p.pulseV *= 0.82; p.pulse += p.pulseV; p.pulse *= 0.94;
      const sparkle = Math.pow(glint, 6) * (p.isOuter ? 0.75 : 0.42);
      const edgeBoost = p.isOuter ? 0.22 : 0;
      const gate = transitioning ? (1-transEase) : clamp((form*1.28) - (p.phase*0.42 + p.lag), 0, 1);
      const r = p.size + tw*0.14*gate + edgeBoost*gate + Math.max(0,p.pulse)*(p.isOuter?1.6:1.2) + sparkle*0.9 + (transitioning?transEase*(p.isOuter?1.2:.5):0);
      const aBase = (0.10 + p.alpha*0.64 + sparkle*0.35) * (0.06 + gate);
      const a = transitioning ? aBase*(1-transEase*0.92) : aBase;
      if(a<=0.003) continue;
      ctx.beginPath(); ctx.fillStyle=`rgba(228,165,255,${a*(p.isOuter?0.14:0.09)})`; ctx.arc(p.x,p.y,r*(p.isOuter?2.8:2.3),0,Math.PI*2); ctx.fill();
      if (sparkle > 0.08){ ctx.beginPath(); ctx.fillStyle=`rgba(255,235,255,${a*0.26})`; ctx.arc(p.x,p.y,r*1.15,0,Math.PI*2); ctx.fill(); }
      ctx.beginPath(); const rr=232 + Math.floor(tw*14 + sparkle*18), gg=165 + Math.floor(tw*26 + sparkle*22);
      ctx.fillStyle=`rgba(${rr},${gg},255,${a})`; ctx.arc(p.x,p.y,Math.max(0.16,r),0,Math.PI*2); ctx.fill();
    }
    drawBackgroundGlow(transitioning ? (1-transEase) : form);
    if(transitioning && transT>=1){ /* keep dark */ }
  }
  frame(performance.now());

  form.addEventListener('submit',e=>{
    e.preventDefault();
    const id=(memberIdInput?.value||'').trim();
    const pw=(memberPwInput?.value||'');
    if(id===AUTH_ID && pw===AUTH_PW){
      localStorage.setItem(AUTH_KEY,'1');
      window.location.href = pendingLoginDestination || ROUTES.vip;
      return;
    }
    alert('아이디 또는 비밀번호가 다릅니다.');
    memberPwInput?.select();
  });
  window.addEventListener('beforeunload',()=>cancelAnimationFrame(raf));
})();
</script>
</body>
</html>
